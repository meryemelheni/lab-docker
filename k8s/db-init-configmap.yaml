apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-script
  namespace: taskflow
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS tasks (
        id SERIAL PRIMARY KEY,
        title VARCHAR(255) NOT NULL,
        description TEXT DEFAULT '',
        status VARCHAR(20) DEFAULT 'todo' CHECK (status IN ('todo', 'in_progress', 'done')),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO tasks (title, description, status) VALUES
        ('Configurer Docker Compose', 'Mettre en place le fichier docker-compose.yml avec les 3 services', 'done'),
        ('Créer l''API REST', 'Implémenter les endpoints GET/POST/PUT/DELETE pour les tâches', 'in_progress'),
        ('Ajouter les health checks', 'Configurer les HEALTHCHECK dans chaque Dockerfile', 'todo'),
        ('Tester l''isolation réseau', 'Vérifier que le frontend ne peut pas contacter la database directement', 'todo');
