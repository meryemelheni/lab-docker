apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: taskflow
data:
  POSTGRES_DB: "taskflow"
  POSTGRES_USER: "taskuser"
  DB_HOST: "database-service"
  DB_PORT: "5432"
  BACKEND_PORT: "3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: taskflow
type: Opaque
stringData:
  POSTGRES_PASSWORD: "taskpass"
